<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container">
        
        <!-- Left portion -->
        <div class="left">
            <div class="overlay">
                <img class="vector" src="./odin-lined.png" alt="Odin logo">   
                <h1 class="logo">ODIN</h1>
            </div>
            <p class="credit">Photo by 
                <a href="https://unsplash.com/@haliewestphoto?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Halie West</a> 
                on <a href="https://unsplash.com/photos/green-leaf-plant-in-close-up-photography-25xggax4bSA?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Unsplash</a>
            </p>
        </div>
        
        <!-- right portion -->
        <div class="right">
            <div class="intro">
                <p>
                This is not a real online service! You know you need something like this 
                in your life to help you realize your 
                deepest dreams.</p>
                <p>Sign up <em>now</em> to get started. You <em>know</em> you want to !</p>
            </div>
            <form action="" method="post" class="form">
                <div class="form-portion">
                    <h2>Let's do this!</h2>
                    <div class="form-grid">
                    <div class="grid-element">
                        <label>FIRST NAME</label>
                        <input type="text" placeholder="Thor">
                    </div>
                    <div class="grid-element">
                        <label>LAST NAME</label>
                        <input type="text" placeholder="Odinson">
                    </div>
                    <div class="grid-element">
                        <label>EMAIL</label>
                        <input type="email">
                    </div>
                    <div class="grid-element">
                        <label>PHONENUMBER</label>
                        <input type="tel">
                    </div>
                    <div class="grid-element">
                        <label>PASSWORD</label>
                        <input type="password">
                    </div>
                    <div class="grid-element">
                        <label>CONFIRM PASSWORD</label>
                        <input type="password">
                    </div>
                    </div>
                </div>
                <div class="button-portion">
                    <button type="submit">Create Account</button>
                    <p class="login">
                        Already have an account? <a href="#">Log in</a>
                    </p>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
